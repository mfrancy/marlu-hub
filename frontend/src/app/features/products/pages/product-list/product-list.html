<p-card header="Lista de produtos" class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <div>
      <p class="text-color-secondary mt-1 mb-0 text-sm">
        Consulte todos os produtos cadastrados no sistema
      </p>
    </div>
  </div>
  <p-table [value]="product()" [rowHover]="true" styleClass="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>Código revista</th>
        <th>Produto</th>
        <th>Descrição</th>
        <th>Marca</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td>{{ product.code }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.description}}</td>
        <td>{{ product.brand }}</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
